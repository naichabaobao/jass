<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>JASS 关键字: native</title></head>
<body>
  <h1><code>native</code></h1>
  <p>声明引擎提供的原生函数。native 没有函数体，只声明签名。</p>
  <pre><code>native UnitAlive takes unit whichUnit returns boolean
native KillUnit takes unit whichUnit returns nothing</code></pre>
  <p>一般定义在 <code>common.j / blizzard.j / common.ai</code> 或你的接口声明文件中。</p>
</body>
</html>

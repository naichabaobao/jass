<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vJass 关键字: delegate</title>
  <style>body { font-family: -apple-system, "Segoe UI", sans-serif; max-width: 860px; margin: 24px auto; padding: 0 16px; line-height: 1.7; } h1 { margin-bottom: 8px; } pre { background: #111; color: #f5f5f5; padding: 12px; border-radius: 8px; overflow-x: auto; } code { font-family: Consolas, monospace; }</style>
</head>
<body>
  <h1><code>delegate</code></h1>
  <h2>语法</h2>
  <pre><code>delegate Type memberName</code></pre>
  <h2>说明</h2>
  <p>声明委托成员；当本结构缺少成员时可转发到委托对象。</p>
  <h2>示例</h2>
  <pre><code>struct B
delegate A deleg
endstruct</code></pre>
  <h2>注意事项</h2>
  <ul><li>委托通常需要初始化；接口实现检查不会用委托方法代替。</li></ul>
</body>
</html>

  <title>vJass 关键字: struct</title>
  <style>body { font-family: -apple-system, "Segoe UI", sans-serif; max-width: 860px; margin: 24px auto; padding: 0 16px; line-height: 1.7; } h1 { margin-bottom: 8px; } pre { background: #111; color: #f5f5f5; padding: 12px; border-radius: 8px; overflow-x: auto; } code { font-family: Consolas, monospace; }</style>
</head>
<body>
  <h1><code>struct</code></h1>
  <h2>语法</h2>
  <pre><code>struct 名称 [extends 父类型]
    // 成员
endstruct</code></pre>
  <h2>说明</h2>
  <p>定义结构类型，可含字段、方法、静态成员与继承。</p>
  <h2>示例</h2>
  <pre><code>struct pair
integer x
integer y
endstruct</code></pre>
  <h2>注意事项</h2>
  <ul><li>结构实例上限受 JASS 索引限制（文档示例约 8190）。</li></ul>
</body>
</html>

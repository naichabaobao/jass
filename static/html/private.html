<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vJass 关键字: private</title>
  <style>body { font-family: -apple-system, "Segoe UI", sans-serif; max-width: 860px; margin: 24px auto; padding: 0 16px; line-height: 1.7; } h1 { margin-bottom: 8px; } pre { background: #111; color: #f5f5f5; padding: 12px; border-radius: 8px; overflow-x: auto; } code { font-family: Consolas, monospace; }</style>
</head>
<body>
  <h1><code>private</code></h1>
  <h2>语法</h2>
  <pre><code>private <声明></code></pre>
  <h2>说明</h2>
  <p>私有可见性。文档说明 private 可用于库/域成员，也可用于 struct 成员。</p>
  <h2>示例</h2>
  <pre><code>private integer N = 0
private function x takes nothing returns nothing
endfunction</code></pre>
  <h2>注意事项</h2>
  <ul><li>私有名会被预处理隔离，避免外部冲突。</li></ul>
</body>
</html>

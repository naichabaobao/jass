<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>JASS 关键字: takes</title></head>
<body>
  <h1><code>takes</code></h1>
  <p>定义函数参数列表，多个参数用逗号分隔。</p>
  <pre><code>function Sum takes integer a, integer b returns integer
function Init takes nothing returns nothing</code></pre>
  <p>建议参数命名语义化，避免 <code>a/b/c</code> 这种弱语义写法。</p>
</body>
</html>

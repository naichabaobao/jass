<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vJass 关键字: stub</title>
  <style>body { font-family: -apple-system, "Segoe UI", sans-serif; max-width: 860px; margin: 24px auto; padding: 0 16px; line-height: 1.7; } h1 { margin-bottom: 8px; } pre { background: #111; color: #f5f5f5; padding: 12px; border-radius: 8px; overflow-x: auto; } code { font-family: Consolas, monospace; }</style>
</head>
<body>
  <h1><code>stub</code></h1>
  <h2>语法</h2>
  <pre><code>stub method name takes ... returns ...</code></pre>
  <h2>说明</h2>
  <p>声明可被子结构覆盖的存根方法。</p>
  <h2>示例</h2>
  <pre><code>struct Parent
stub method xx takes nothing returns nothing
    call BJDebugMsg("Parent")
endmethod
endstruct</code></pre>
  <h2>注意事项</h2>
  <ul><li>用于给继承层次提供默认实现。</li></ul>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>JASS 关键字: set</title></head>
<body>
  <h1><code>set</code></h1>
  <p>赋值语句，用于更新变量或数组元素。</p>
  <pre><code>set i = i + 1
set hp = GetUnitState(u, UNIT_STATE_LIFE)
set score[playerId] = 100</code></pre>
  <p>不要给 <code>constant</code> 变量使用 <code>set</code> 赋值。</p>
</body>
</html>

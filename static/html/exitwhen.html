<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>JASS 关键字: exitwhen</title></head>
<body>
  <h1><code>exitwhen</code></h1>
  <p>在 <code>loop</code> 中用于退出循环，不会结束整个函数。</p>
  <pre><code>loop
    exitwhen i &gt;= max
    set i = i + 1
endloop</code></pre>
  <p>和 <code>return</code> 区别：<code>return</code> 会结束函数。</p>
</body>
</html>

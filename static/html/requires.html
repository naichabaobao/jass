<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vJass 关键字: requires</title>
  <style>body { font-family: -apple-system, "Segoe UI", sans-serif; max-width: 860px; margin: 24px auto; padding: 0 16px; line-height: 1.7; } h1 { margin-bottom: 8px; } pre { background: #111; color: #f5f5f5; padding: 12px; border-radius: 8px; overflow-x: auto; } code { font-family: Consolas, monospace; }</style>
</head>
<body>
  <h1><code>requires</code></h1>
  <h2>语法</h2>
  <pre><code>library X requires A</code></pre>
  <h2>说明</h2>
  <p>声明库依赖，确保被依赖库先编译/初始化。</p>
  <h2>示例</h2>
  <pre><code>library B requires A
endlibrary</code></pre>
  <h2>注意事项</h2>
  <ul><li>可写 requires optional A 表示缺失时不报语法错误。</li></ul>
</body>
</html>

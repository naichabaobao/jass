<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <title>vJass 关键字: allocate</title>
  <style>body { font-family: -apple-system, "Segoe UI", sans-serif; max-width: 860px; margin: 24px auto; padding: 0 16px; line-height: 1.7; } h1 { margin-bottom: 8px; } pre { background: #111; color: #f5f5f5; padding: 12px; border-radius: 8px; overflow-x: auto; } code { font-family: Consolas, monospace; }</style>
</head>
<body>
  <h1><code>allocate</code></h1>
  <h2>语法</h2>
  <pre><code>local x = Type.allocate(...)</code></pre>
  <h2>说明</h2>
  <p>底层实例分配方法，默认用于 create 实现。</p>
  <h2>示例</h2>
  <pre><code>local vec r = vec.allocate()</code></pre>
  <h2>注意事项</h2>
  <ul><li>文档指出该方法通常为私有，不建议在结构外直接暴露。</li></ul>
</body>
</html>

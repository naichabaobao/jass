<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vJass 关键字: method</title>
  <style>body { font-family: -apple-system, "Segoe UI", sans-serif; max-width: 860px; margin: 24px auto; padding: 0 16px; line-height: 1.7; } h1 { margin-bottom: 8px; } pre { background: #111; color: #f5f5f5; padding: 12px; border-radius: 8px; overflow-x: auto; } code { font-family: Consolas, monospace; }</style>
</head>
<body>
  <h1><code>method</code></h1>
  <h2>语法</h2>
  <pre><code>method name takes ... returns ...
    // body
endmethod</code></pre>
  <h2>说明</h2>
  <p>定义结构/接口方法。实例方法可用 this 访问当前实例。</p>
  <h2>示例</h2>
  <pre><code>method move takes real tx, real ty returns nothing
    set this.x = tx
endmethod</code></pre>
  <h2>注意事项</h2>
  <ul><li>方法语法接近 function；static method 为类方法。</li></ul>
</body>
</html>

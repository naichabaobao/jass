  <title>vJass 关键字: execute</title>
  <style>body { font-family: -apple-system, "Segoe UI", sans-serif; max-width: 860px; margin: 24px auto; padding: 0 16px; line-height: 1.7; } h1 { margin-bottom: 8px; } pre { background: #111; color: #f5f5f5; padding: 12px; border-radius: 8px; overflow-x: auto; } code { font-family: Consolas, monospace; }</style>
</head>
<body>
  <h1><code>execute</code></h1>
  <h2>语法</h2>
  <pre><code>call ExecuteFunc("FuncName")</code></pre>
  <h2>说明</h2>
  <p>文档在 library initializer 章节提到使用 ExecuteFunc 触发初始化线程。</p>
  <h2>示例</h2>
  <pre><code>function InitA takes nothing returns nothing
endfunction
call ExecuteFunc("InitA")</code></pre>
  <h2>注意事项</h2>
  <ul><li>通常由编译器/框架生成，不建议手工滥用。</li></ul>
</body>

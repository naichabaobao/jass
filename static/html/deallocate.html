<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <title>vJass 关键字: deallocate</title>
  <style>body { font-family: -apple-system, "Segoe UI", sans-serif; max-width: 860px; margin: 24px auto; padding: 0 16px; line-height: 1.7; } h1 { margin-bottom: 8px; } pre { background: #111; color: #f5f5f5; padding: 12px; border-radius: 8px; overflow-x: auto; } code { font-family: Consolas, monospace; }</style>
</head>
<body>
  <h1><code>deallocate</code></h1>
  <h2>语法</h2>
  <pre><code>call this.deallocate()</code></pre>
  <h2>说明</h2>
  <p>底层释放方法，可在自定义 destroy 中调用常规销毁流程。</p>
  <h2>示例</h2>
  <pre><code>method destroy takes nothing returns nothing
    call this.deallocate()
endmethod</code></pre>
  <h2>注意事项</h2>
  <ul><li>仅在明确自定义 destroy 流程时使用。</li></ul>
</body>
</html>

  <title>vJass 关键字: thistype</title>
  <style>body { font-family: -apple-system, "Segoe UI", sans-serif; max-width: 860px; margin: 24px auto; padding: 0 16px; line-height: 1.7; } h1 { margin-bottom: 8px; } pre { background: #111; color: #f5f5f5; padding: 12px; border-radius: 8px; overflow-x: auto; } code { font-family: Consolas, monospace; }</style>

<body>
  <h1><code>thistype</code></h1>
  <h2>语法</h2>
  <pre><code>thistype <变量或返回类型></code></pre>
  <h2>说明</h2>
  <p>在结构内部等价于当前结构名。</p>
  <h2>示例</h2>
  <pre><code>struct test
thistype array ts
method tester takes nothing returns thistype
    return thistype.allocate()
endmethod
endstruct</code></pre>
  <h2>注意事项</h2>
  <ul><li>仅在结构上下文使用。</li></ul>
</body>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vJass 关键字: scope</title>
  <style>body { font-family: -apple-system, "Segoe UI", sans-serif; max-width: 860px; margin: 24px auto; padding: 0 16px; line-height: 1.7; } h1 { margin-bottom: 8px; } pre { background: #111; color: #f5f5f5; padding: 12px; border-radius: 8px; overflow-x: auto; } code { font-family: Consolas, monospace; }</style>
</head>
<body>
  <h1><code>scope</code></h1>
  <h2>语法</h2>
  <pre><code>scope 名称
    // 内容
endscope</code></pre>
  <h2>说明</h2>
  <p>声明作用域块。文档中用于组织一组代码并配合 private/public 控制可见性。</p>
  <h2>示例</h2>
  <pre><code>scope GetUnitDebugStr
private function H2I takes handle h returns integer
    return h
endfunction
endscope</code></pre>
  <h2>注意事项</h2>
  <ul><li>scope 不是库依赖系统；用于命名与可见性管理。</li></ul>
</body>
</html>

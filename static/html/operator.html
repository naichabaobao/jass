<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vJass 关键字: operator</title>
  <style>body { font-family: -apple-system, "Segoe UI", sans-serif; max-width: 860px; margin: 24px auto; padding: 0 16px; line-height: 1.7; } h1 { margin-bottom: 8px; } pre { background: #111; color: #f5f5f5; padding: 12px; border-radius: 8px; overflow-x: auto; } code { font-family: Consolas, monospace; }</style>
</head>
<body>
  <h1><code>operator</code></h1>
  <h2>语法</h2>
  <pre><code>method operator [] ...
method operator < ...</code></pre>
  <h2>说明</h2>
  <p>操作符重载入口。文档支持 []、[]=、<（并据此生成 >）等。</p>
  <h2>示例</h2>
  <pre><code>method operator [] takes integer i returns string
    return SubString(.str, i, i + 1)
endmethod</code></pre>
  <h2>注意事项</h2>
  <ul><li>operator < 必须返回 boolean 且参数类型匹配。</li></ul>
</body>
</html>

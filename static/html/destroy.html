<body>
  <h1><code>destroy</code></h1>
  <h2>语法</h2>
  <pre><code>call x.destroy()
call Type.destroy(x)</code></pre>
  <h2>说明</h2>
  <p>释放结构/数组实例；可触发 onDestroy。</p>
  <h2>示例</h2>
  <pre><code>call p.destroy()</code></pre>
  <h2>注意事项</h2>
  <ul><li>对 0 调用在调试模式下会告警。</li></ul>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vJass 关键字: debug</title>
  <style>body { font-family: -apple-system, "Segoe UI", sans-serif; max-width: 860px; margin: 24px auto; padding: 0 16px; line-height: 1.7; } h1 { margin-bottom: 8px; } pre { background: #111; color: #f5f5f5; padding: 12px; border-radius: 8px; overflow-x: auto; } code { font-family: Consolas, monospace; }</style>
</head>
<body>
  <h1><code>debug</code></h1>
  <h2>语法</h2>
  <pre><code>debug <statement></code></pre>
  <h2>说明</h2>
  <p>调试语句前缀。文档说明在非 debug 编译模式下整行会被移除。</p>
  <h2>示例</h2>
  <pre><code>debug call BJDebugMsg("a is " + I2S(a))</code></pre>
  <h2>注意事项</h2>
  <ul><li>可结合常量 DEBUG_MODE 控制调试行为。</li></ul>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>JASS 关键字: then</title></head>
<body>
  <h1><code>then</code></h1>
  <p>连接条件表达式与分支体，和 <code>if/elseif</code> 配套出现。</p>
  <pre><code>if cond then
    call Foo()
elseif other then
    call Bar()
endif</code></pre>
  <p>缺少 <code>then</code> 会导致分支语法错误。</p>
</body>
</html>

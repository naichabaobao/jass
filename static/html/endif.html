<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>JASS 关键字: endif</title></head>
<body>
  <h1><code>endif</code></h1>
  <p>结束 <code>if/elseif/else</code> 分支块。</p>
  <pre><code>if cond then
    call Foo()
endif</code></pre>
  <p>建议保持缩进一致，便于检查分支闭合。</p>
</body>
</html>

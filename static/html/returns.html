<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>JASS 关键字: returns</title></head>
<body>
  <h1><code>returns</code></h1>
  <p>定义函数返回类型，支持基础类型与自定义类型。</p>
  <pre><code>function IsAlive takes unit u returns boolean
function Add takes integer a, integer b returns integer
function Init takes nothing returns nothing</code></pre>
  <p><code>returns T</code> 建议所有路径显式 <code>return T</code>。</p>
</body>
</html>

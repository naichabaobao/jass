<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>JASS 关键字: endglobals</title></head>
<body>
  <h1><code>endglobals</code></h1>
  <p>结束全局变量声明块。</p>
  <pre><code>globals
    integer gCount = 0
    unit array gUnits
endglobals</code></pre>
  <p>与 <code>globals</code> 必须成对出现。</p>
</body>
</html>

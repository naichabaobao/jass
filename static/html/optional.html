<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vJass 关键字: optional</title>
  <style>body { font-family: -apple-system, "Segoe UI", sans-serif; max-width: 860px; margin: 24px auto; padding: 0 16px; line-height: 1.7; } h1 { margin-bottom: 8px; } pre { background: #111; color: #f5f5f5; padding: 12px; border-radius: 8px; overflow-x: auto; } code { font-family: Consolas, monospace; }</style>
</head>
<body>
  <h1><code>optional</code></h1>
  <h2>语法</h2>
  <pre><code>requires optional LibX
implement optional ModX</code></pre>
  <h2>说明</h2>
  <p>可选依赖前缀。缺失目标时不报语法错误。</p>
  <h2>示例</h2>
  <pre><code>library OptionalCode requires optional UnitKiller
endlibrary</code></pre>
  <h2>注意事项</h2>
  <ul><li>常用于兼容可选库/模块。</li></ul>
</body>
</html>

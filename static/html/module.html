<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vJass 关键字: module</title>
  <style>body { font-family: -apple-system, "Segoe UI", sans-serif; max-width: 860px; margin: 24px auto; padding: 0 16px; line-height: 1.7; } h1 { margin-bottom: 8px; } pre { background: #111; color: #f5f5f5; padding: 12px; border-radius: 8px; overflow-x: auto; } code { font-family: Consolas, monospace; }</style>
</head>
<body>
  <h1><code>module</code></h1>
  <h2>语法</h2>
  <pre><code>module M
    // 成员
endmodule</code></pre>
  <h2>说明</h2>
  <p>声明可复用模块；被 implement 到 struct 时相当于复制成员。</p>
  <h2>示例</h2>
  <pre><code>module MyRepeatModule
method repeat1000 takes nothing returns nothing
endmethod
endmodule</code></pre>
  <h2>注意事项</h2>
  <ul><li>模块内可定义 onInit；与结构 onInit 可共存。</li></ul>
</body>
</html>

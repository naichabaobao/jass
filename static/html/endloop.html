<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>JASS 关键字: endloop</title></head>
<body>
  <h1><code>endloop</code></h1>
  <p>结束循环块，与 <code>loop</code> 成对使用。</p>
  <pre><code>loop
    exitwhen i &gt;= 10
    set i = i + 1
endloop</code></pre>
  <p>循环中通常配合 <code>exitwhen</code>，否则可能死循环。</p>
</body>
</html>

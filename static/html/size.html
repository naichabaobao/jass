<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vJass 关键字: size</title>
  <style>body { font-family: -apple-system, "Segoe UI", sans-serif; max-width: 860px; margin: 24px auto; padding: 0 16px; line-height: 1.7; } h1 { margin-bottom: 8px; } pre { background: #111; color: #f5f5f5; padding: 12px; border-radius: 8px; overflow-x: auto; } code { font-family: Consolas, monospace; }</style>
</head>
<body>
  <h1><code>size</code></h1>
  <h2>语法</h2>
  <pre><code>Type.size 或 arrayMember.size</code></pre>
  <h2>说明</h2>
  <p>大小字段。文档用于动态数组类型和数组成员。</p>
  <h2>示例</h2>
  <pre><code>exitwhen i == arsample.size</code></pre>
  <h2>注意事项</h2>
  <ul><li>用于遍历上限判断，避免硬编码长度。</li></ul>
</body>
</html>

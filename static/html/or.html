<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>JASS 关键字: or</title></head>
<body>
  <h1><code>or</code></h1>
  <p>逻辑或。左右任一条件为真即为真。</p>
  <pre><code>if u == null or GetWidgetLife(u) &lt;= 0.405 then
    return
endif</code></pre>
  <p>常用于“快速失败”条件。</p>
</body>
</html>

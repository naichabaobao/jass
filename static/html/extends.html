<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>JASS 关键字: extends</title></head>
<body>
  <h1><code>extends</code></h1>
  <p>用于类型继承声明，常见于 <code>type A extends B</code>。</p>
  <pre><code>type myevent extends event
type myunit extends unit</code></pre>
  <p>建议只在需要语义区分时创建新类型。</p>
</body>
</html>

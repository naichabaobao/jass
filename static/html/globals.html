<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>JASS 关键字: globals</title></head>
<body>
  <h1><code>globals</code></h1>
  <p>开始全局变量声明块，生命周期贯穿地图脚本运行期。</p>
  <pre><code>globals
    integer gRound = 0
    unit array gUnits
endglobals</code></pre>
  <p>建议：全局命名带前缀，减少跨系统命名冲突。</p>
</body>
</html>

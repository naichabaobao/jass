<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>JASS 关键字: type</title></head>
<body>
  <h1><code>type</code></h1>
  <p>声明新类型，常用于强化语义或兼容特定 API 类型约束。</p>
  <pre><code>type myevent extends event
type myagent extends agent</code></pre>
  <p>建议基于已有体系扩展，避免创建无实际语义价值的别名类型。</p>
</body>
</html>

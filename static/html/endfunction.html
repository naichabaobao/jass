<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>JASS 关键字: endfunction</title></head>
<body>
  <h1><code>endfunction</code></h1>
  <p>结束函数块。每个 <code>function</code> 必须有对应的 <code>endfunction</code>。</p>
  <pre><code>function Foo takes nothing returns nothing
    call BJDebugMsg("ok")
endfunction</code></pre>
  <p>漏写会导致后续语法整体错位。</p>
</body>
</html>
